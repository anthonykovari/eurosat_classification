<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EuroSAT Classifier</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; }
    label, button { display: block; margin: 15px 0 5px; }
    #result { margin-top: 20px; font-weight: bold; }
    img { max-width: 100%; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>EuroSAT Image Classifier</h1>
  <form id="uploadForm">
    <label for="fileInput">Choose an image file:</label>
    <input type="file" id="fileInput" name="file" accept="image/*" required />
    <button type="submit">Predict</button>
  </form>
  <div id="result"></div>
  <img id="preview" src="" alt="Uploaded image" />

  <script>
    const form = document.getElementById('uploadForm');
    const resultDiv = document.getElementById('result');
    const previewImg = document.getElementById('preview');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resultDiv.textContent = 'Predicting...';
      previewImg.src = '';

      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      if (!file) {
        resultDiv.textContent = 'Please select a file first.';
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await fetch('http://localhost:8000/predict/', {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) throw new Error('Network response was not ok');

        const data = await response.json();
        resultDiv.textContent = `File: ${data.filename} → Predicted Class: ${data.predicted_class}`;
        
        if (data.image_url) {
          previewImg.src = 'http://localhost:8000' + data.image_url;
        }
      } catch (error) {
        resultDiv.textContent = 'Error: ' + error.message;
      }
    });
  </script>
</body>
</html>
