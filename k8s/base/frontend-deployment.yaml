apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: eurosat
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eurosat
      component: frontend
  template:
    metadata:
      labels:
        app: eurosat
        component: frontend
    spec:
      containers:
        - name: frontend
          image: eurosat-frontend:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
