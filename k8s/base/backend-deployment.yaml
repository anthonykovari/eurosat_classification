apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: eurosat
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eurosat
      component: backend
  template:
    metadata:
      labels:
        app: eurosat
        component: backend
    spec:
      initContainers:
        - name: download-model
          image: amazon/aws-cli:latest
          command:
            - sh
            - -c
            - |
              aws s3 cp s3://$(S3_BUCKET)/$(S3_MODEL_KEY) /outputs/resnet18_eurosat.pth
          envFrom:
            - configMapRef:
                name: eurosat-config
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: secret-access-key
          volumeMounts:
            - name: model-store
              mountPath: /outputs
      containers:
        - name: backend
          image: eurosat-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: eurosat-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: model-store
              mountPath: /app/outputs
            - name: uploads
              mountPath: /app/uploaded
      volumes:
        - name: model-store
          emptyDir: {}
        - name: uploads
          emptyDir: {}
