apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: backend-service-patch.yaml
  - path: frontend-service-patch.yaml

# Image tags are injected at deploy time by:
#   kustomize edit set image eurosat-backend=<ECR_URI>:<TAG>
images:
  - name: eurosat-backend
    newName: PLACEHOLDER_ECR_BACKEND
    newTag: latest
  - name: eurosat-frontend
    newName: PLACEHOLDER_ECR_FRONTEND
    newTag: latest

configMapGenerator:
  - name: eurosat-config
    behavior: merge
    literals:
      - DEBUG=false
